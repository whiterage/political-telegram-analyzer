source: "json"

input_file: "posts.json"
output_file: "out_posts.csv"
summary_output_file: "out_summary.csv"
channel_summary_output_file: "out_channel_summary.csv"
channel_group_summary_output_file: "out_channel_group_summary.csv"
date_from: "2026-05-01T00:00:00+03:00"
date_to: "2026-05-31T23:59:59+03:00"
min_views: 1000
min_total_reactions: 10

top_limit: 2

channels:
  - username: "test_channel"
    name: "Тестовый канал"
    category: "news"
    actor_type: "media"
  - username: "news24"
    name: "Новости 24"
    category: "news"
    actor_type: "media"
  - username: "polit_diary"
    name: "Политический дневник"
    category: "personal"
    actor_type: "political_actor"

telegram:
  api_id: 0
  api_hash: ""
  session_file: "telegram.session"
  fetch_limit: 5
